<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <style>
    .form-container {
      width: 300px;
      margin: 50px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      text-align: center;
    }

    .form-container input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      box-sizing: border-box;
    }

    .form-container button {
      background-color: #4CAF50;
      color: white;
      padding: 14px 20px;
      margin: 8px 0;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }

    .form-container button:hover {
      background-color: #45a049;
    }

    .form-container a {
      color: #007bff;
      text-decoration: none;
    }

    .form-container a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <main>
    <section class="form-container" aria-labelledby="signup-heading">
      <h2 id="signup-heading">Sign Up</h2>
      <form id="signupForm">
        <label for="signupName" class="visually-hidden">Full Name</label>
        <input type="text" id="signupName" name="name" placeholder="Full Name" required />

        <label for="signupEmail" class="visually-hidden">Email</label>
        <input type="email" id="signupEmail" name="email" placeholder="Email" required />

        <label for="signupPassword" class="visually-hidden">Password</label>
        <input type="password" id="signupPassword" name="password" placeholder="Password" required />

        <label for="confirmPassword" class="visually-hidden">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required />

        <button type="submit">Sign Up</button>

        <p>Already have an account? <a href="login.html">Login</a></p>
      </form>
    </section>
  </main>

  <!-- External JavaScript for signup -->
  <script type="module" src="signup.js"></script>
</body>

</html>
